<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Europa Mission Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            background: #000;
            color: #fff;
            font-family: 'Outfit', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            background: radial-gradient(circle at center, #0a1a3a 0%, #000 100%);
        }

        .container {
            text-align: center;
            z-index: 2;
        }

        h1 {
            font-size: 4rem;
            letter-spacing: 0.5rem;
            text-transform: uppercase;
            margin-bottom: 0;
            background: linear-gradient(180deg, #fff 0%, #4a9eff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: #4a9eff;
            letter-spacing: 0.2rem;
            margin-bottom: 3rem;
        }

        .menu {
            display: flex;
            gap: 2rem;
        }

        .menu-item {
            padding: 1.5rem 3rem;
            border: 1px solid rgba(74, 158, 255, 0.3);
            background: rgba(74, 158, 255, 0.05);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            color: #fff;
            text-transform: uppercase;
            font-weight: 600;
            backdrop-filter: blur(10px);
        }

        .menu-item:hover {
            background: rgba(74, 158, 255, 0.2);
            border-color: #4a9eff;
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(74, 158, 255, 0.2);
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>EXPEDITION EUROPA</h1>
        <p>MISSION CONTROL INTERFACE - JUNO-2 MISSION</p>
        <div class="menu">
            <a href="lander.html" class="menu-item">Phase 1: Surface Landing</a>
            <a href="cave.html" class="menu-item">Phase 2: Cave Explorer</a>
            <a href="sea.html" class="menu-item">Phase 3: Liedenbrock Sea</a>
            <a href="citations.html" class="menu-item">Archive: Mission Data</a>
        </div>
    </div>
</body>

</html>
